<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FocoÚnico</title>
  <link rel="stylesheet" href="src/styles.css" />
  <link rel="icon" href="assets/images/FocoUnico.png" />
  <meta name="description" content="FocoÚnico — una app mínima para concentrarte en un solo sub-paso. Temporizador de foco y descansos obligatorios." />
  <meta name="theme-color" content="#5f6f83" />
  <link rel="apple-touch-icon" href="assets/images/FocoUnico.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/images/FocoUnico.png" />
  <!-- Open Graph / Social preview -->
  <meta property="og:title" content="FocoÚnico" />
  <meta property="og:description" content="Concentra tu atención en un único sub-paso: 20 minutos de foco y 5 de descanso." />
  <meta property="og:image" content="https://raw.githubusercontent.com/arturo-dev-ops/focounico-app/main/assets/images/FocoUnico.png" />
  <meta property="og:type" content="website" />
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="FocoÚnico" />
  <meta name="twitter:description" content="20 minutos de foco + 5 minutos de descanso. Simplifica tu productividad." />
  <meta name="twitter:image" content="https://raw.githubusercontent.com/arturo-dev-ops/focounico-app/main/assets/images/FocoUnico.png" />
</head>
<body>
  <main>
    <section id="pantalla-volcado" class="pantalla">
      <div class="card">
        <img src="assets/images/FocoUnico.png" alt="FocoÚnico logo" class="logo" />
        <h1>FocoÚnico</h1>
        <p class="texto-intro">Escribe tu gran tarea y el sub-paso que vas a completar ahora.</p>
        <label for="tarea">Gran tarea</label>
        <input id="tarea" type="text" placeholder="Ej. Estudiar para el parcial" />
        <label for="subpaso">Sub-paso</label>
        <input id="subpaso" type="text" placeholder="Ej. Leer el capítulo 3" />
        <div class="config-group">
          <div class="config-field">
            <label for="foco-minutos">Minutos de foco</label>
            <input id="foco-minutos" type="number" min="1" value="20" />
          </div>
          <div class="config-field">
            <label for="descanso-minutos">Minutos de descanso</label>
            <input id="descanso-minutos" type="number" min="1" value="5" />
          </div>
        </div>
        <button id="boton-iniciar" type="button">Iniciar Foco</button>
      </div>
    </section>

    <section id="pantalla-foco" class="pantalla oculto">
      <div class="card foco-card">
        <div class="etiqueta">Sub-paso activo</div>
        <h2 id="texto-gran-tarea"></h2>
        <p id="texto-subpaso" class="subpaso"></p>
        <div id="contenedor-tiempo" class="cronometro">20:00</div>
        <p id="mensaje-foco" class="mensaje">Mantente concentrado hasta que termine el tiempo.</p>
        <button id="boton-siguiente" class="oculto" type="button">Siguiente tarea</button>
      </div>
    </section>
  </main>
  <script src="src/app.js"></script>
</body>
</html>
